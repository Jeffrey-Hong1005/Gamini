<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Stack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1116; font-family: -apple-system, system-ui, "Segoe UI", sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 22px; color: #eef2f7; pointer-events: none; user-select: none;
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  #score { font-size: 15px; opacity: .85; letter-spacing: .5px; }
  #height { font-size: 40px; font-weight: 700; line-height: 1; margin-top: 2px; }
  #speed { text-align: right; font-size: 13px; opacity: .7; }

  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #eef2f7;
    background: radial-gradient(ellipse at center, rgba(14,17,22,.55), rgba(14,17,22,.85));
    text-align: center; padding: 24px;
  }
  .overlay h1 { font-size: 44px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
  .overlay p { font-size: 16px; opacity: .85; line-height: 1.7; max-width: 440px; }
  .overlay .big { font-size: 28px; font-weight: 700; margin: 6px 0 16px; }
  .key { display: inline-block; padding: 2px 10px; margin: 0 3px; border-radius: 6px;
         background: #2a3140; border: 1px solid #3c4759; font-size: 14px; font-weight: 600; }
  .hint { margin-top: 22px; font-size: 14px; opacity: .7; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud" class="hidden">
  <div>
    <div id="score">HEIGHT</div>
    <div id="height">0</div>
  </div>
  <div id="speed">SPEED ×1.0</div>
</div>

<div id="startScreen" class="overlay">
  <h1>TILE STACK</h1>
  <p>네 방향에서 타일이 날아옵니다. <span class="key">Enter</span> 를 눌러 그 자리에 타일을 떨어뜨리세요.<br>
     타일이 바닥에 떨어지거나 탑의 무게중심이 무너지면 게임 오버입니다.<br>
     속도는 점점 빨라집니다. 최대한 높이 쌓아보세요.</p>
  <div class="hint">▸ <span class="key">Enter</span> 또는 <span class="key">Space</span> 로 시작</div>
</div>

<div id="overScreen" class="overlay hidden">
  <h1>GAME OVER</h1>
  <div class="big" id="finalText">Height 0</div>
  <p id="overReason"></p>
  <div class="hint">▸ <span class="key">Enter</span> 로 다시 시작</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  // ---------- constants ----------
  var TILE_H   = 1.0;       // tile thickness
  var BASE     = 5.0;       // base platform size
  var SPAN     = 13;        // how far out tiles spawn / exit
  var COM_TOL  = 0.10;      // allowed center-of-mass overhang (fraction of support size)

  // ---------- three.js setup ----------
  var app = document.getElementById("app");
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0e1116);
  scene.fog = new THREE.Fog(0x0e1116, 45, 95);

  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  app.appendChild(renderer.domElement);

  // lights
  var amb = new THREE.AmbientLight(0xb8c6e0, 0.55);
  scene.add(amb);
  var key = new THREE.DirectionalLight(0xffffff, 0.95);
  key.position.set(20, 36, 14);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  key.shadow.camera.near = 1;
  key.shadow.camera.far = 140;
  var s = 40;
  key.shadow.camera.left = -s; key.shadow.camera.right = s;
  key.shadow.camera.top = s;   key.shadow.camera.bottom = -s;
  scene.add(key);
  var fill = new THREE.DirectionalLight(0x6f8fff, 0.35);
  fill.position.set(-18, 12, -16);
  scene.add(fill);

  // ground (the "floor" tiles fall to)
  var ground = new THREE.Mesh(
    new THREE.CircleGeometry(60, 64),
    new THREE.MeshStandardMaterial({ color: 0x141923, roughness: 1, metalness: 0 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // group that holds all tiles
  var world = new THREE.Group();
  scene.add(world);

  // landing-projection marker (where the moving tile will drop)
  var markerGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 0.02, 1));
  var marker = new THREE.LineSegments(markerGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
  scene.add(marker);
  marker.visible = false;

  // ---------- game state ----------
  var stack = [];          // placed tiles: {mesh,x,z,w,d,y,mass}
  var moving = null;       // current flying tile
  var falling = [];        // tiles animating their fall {mesh,vx,vy,vz,rx,rz}
  var state = "start";     // start | playing | collapsing | over
  var speed = 6;           // travel units / sec
  var score = 0;
  var camTarget = new THREE.Vector3(0, 0, 0);

  var hud = document.getElementById("hud");
  var heightEl = document.getElementById("height");
  var speedEl = document.getElementById("speed");
  var startScreen = document.getElementById("startScreen");
  var overScreen = document.getElementById("overScreen");
  var finalText = document.getElementById("finalText");
  var overReason = document.getElementById("overReason");

  function tileColor(h) {
    var hue = (200 + h * 14) % 360;
    return new THREE.Color("hsl(" + hue + ", 62%, 58%)");
  }

  function makeTileMesh(w, d, color) {
    var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.55, metalness: 0.05 });
    var mesh = new THREE.Mesh(new THREE.BoxGeometry(w, TILE_H, d), mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function topTile() { return stack[stack.length - 1]; }
  function topSurfaceY() { var t = topTile(); return t.y + TILE_H / 2; }

  // ---------- difficulty ----------
  function currentSizeRange() {
    // early tiles are never tiny; the band widens for more variety as score rises
    var minS = Math.max(1.3, 3.0 - score * 0.05);
    var maxS = Math.min(7.0, minS + 3.2);
    return { min: minS, max: maxS };
  }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  function updateSpeed() {
    speed = 6 + score * 0.55;          // gradually faster
    if (speed > 26) speed = 26;        // cap
    speedEl.textContent = "SPEED ×" + (speed / 6).toFixed(1);
  }

  // ---------- spawning ----------
  function spawnMoving() {
    var top = topTile();
    var r = currentSizeRange();
    var w = rand(r.min, r.max);
    var d = rand(r.min, r.max);
    var color = tileColor(stack.length);
    var mesh = makeTileMesh(w, d, color);

    // pick one of 4 directions: N->S, S->N, W->E, E->W
    var dir = Math.floor(Math.random() * 4);
    var m = { mesh: mesh, w: w, d: d, y: topSurfaceY() + TILE_H / 2 };

    if (dir === 0) { m.axis = "z"; m.pos = -SPAN; m.vel = 1; m.cross = top.x; } // N->S
    else if (dir === 1) { m.axis = "z"; m.pos = SPAN; m.vel = -1; m.cross = top.x; } // S->N
    else if (dir === 2) { m.axis = "x"; m.pos = -SPAN; m.vel = 1; m.cross = top.z; } // W->E
    else { m.axis = "x"; m.pos = SPAN; m.vel = -1; m.cross = top.z; } // E->W

    applyMovingTransform(m);
    world.add(mesh);
    moving = m;
    marker.visible = true;
    marker.scale.set(w, 1, d);
  }

  function applyMovingTransform(m) {
    if (m.axis === "z") { m.mesh.position.set(m.cross, m.y, m.pos); }
    else { m.mesh.position.set(m.pos, m.y, m.cross); }
  }

  // ---------- center of mass stability ----------
  // For each support tile i, the combined COM of everything above it must lie
  // within tile i's footprint (with a small tolerance). Otherwise it topples.
  // Returns index of the lowest failing support, or -1 if stable.
  function findCollapseIndex() {
    for (var i = 0; i < stack.length - 1; i++) {
      var mx = 0, mz = 0, mass = 0;
      for (var j = i + 1; j < stack.length; j++) {
        mx += stack[j].x * stack[j].mass;
        mz += stack[j].z * stack[j].mass;
        mass += stack[j].mass;
      }
      if (mass <= 0) continue;
      var comX = mx / mass, comZ = mz / mass;
      var sup = stack[i];
      var halfW = sup.w / 2 + sup.w * COM_TOL;
      var halfD = sup.d / 2 + sup.d * COM_TOL;
      if (Math.abs(comX - sup.x) > halfW || Math.abs(comZ - sup.z) > halfD) {
        return i;
      }
    }
    return -1;
  }

  // overlap area between two footprints
  function overlapArea(a, b) {
    var ox = Math.min(a.x + a.w / 2, b.x + b.w / 2) - Math.max(a.x - a.w / 2, b.x - b.w / 2);
    var oz = Math.min(a.z + a.d / 2, b.z + b.d / 2) - Math.max(a.z - a.d / 2, b.z - b.d / 2);
    if (ox <= 0 || oz <= 0) return 0;
    return ox * oz;
  }

  // ---------- drop ----------
  function dropTile() {
    if (state !== "playing" || !moving) return;

    var x, z;
    if (moving.axis === "z") { x = moving.cross; z = moving.pos; }
    else { x = moving.pos; z = moving.cross; }

    var top = topTile();
    var newTile = {
      mesh: moving.mesh, x: x, z: z, w: moving.w, d: moving.d,
      y: topSurfaceY() + TILE_H / 2, mass: moving.w * moving.d
    };
    newTile.mesh.position.set(x, newTile.y, z);

    var ov = overlapArea(newTile, top);
    moving = null;
    marker.visible = false;

    if (ov <= 0.0001) {
      // missed the stack entirely -> falls to the floor
      newTile.mesh.position.set(x, newTile.y, z);
      falling.push({ mesh: newTile.mesh, vx: 0, vy: 0, vz: 0,
                     rx: rand(-2, 2), rz: rand(-2, 2) });
      gameOver("타일이 탑을 빗나가 바닥에 떨어졌습니다.");
      return;
    }

    // place it
    stack.push(newTile);
    score = stack.length - 1;
    heightEl.textContent = score;
    updateSpeed();

    // stability check
    var idx = findCollapseIndex();
    if (idx >= 0) {
      collapseFrom(idx + 1, "탑의 무게중심이 무너졌습니다.");
      return;
    }

    spawnMoving();
  }

  // ---------- collapse / game over ----------
  function collapseFrom(startIdx, reason) {
    state = "collapsing";
    // push tiles above the failing interface into free fall with spin
    for (var i = startIdx; i < stack.length; i++) {
      var t = stack[i];
      falling.push({
        mesh: t.mesh,
        vx: rand(-3, 3), vy: rand(1, 4), vz: rand(-3, 3),
        rx: rand(-4, 4), rz: rand(-4, 4)
      });
    }
    // keep only stable tiles in stack
    stack.length = startIdx;
    setTimeout(function () { gameOver(reason); }, 700);
  }

  function gameOver(reason) {
    if (state === "over") return;
    if (state !== "collapsing") state = "over";
    else state = "over";
    finalText.textContent = "Height " + score;
    overReason.textContent = reason;
    overScreen.classList.remove("hidden");
  }

  // ---------- lifecycle ----------
  function clearWorld() {
    while (world.children.length) {
      var c = world.children[0];
      world.remove(c);
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    }
    falling.forEach(function (f) {
      if (f.mesh.parent) f.mesh.parent.remove(f.mesh);
      if (f.mesh.geometry) f.mesh.geometry.dispose();
    });
    falling = [];
    stack = [];
    moving = null;
  }

  function startGame() {
    clearWorld();
    score = 0;
    heightEl.textContent = "0";
    updateSpeed();

    // base platform
    var baseMesh = makeTileMesh(BASE, BASE, new THREE.Color(0x3a4252));
    var base = { mesh: baseMesh, x: 0, z: 0, w: BASE, d: BASE, y: TILE_H / 2, mass: BASE * BASE };
    baseMesh.position.set(0, base.y, 0);
    world.add(baseMesh);
    stack.push(base);

    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
    hud.classList.remove("hidden");

    state = "playing";
    spawnMoving();
  }

  // ---------- input ----------
  function onKey(e) {
    if (e.code === "Enter" || e.code === "Space") {
      e.preventDefault();
      if (state === "start" || state === "over") startGame();
      else if (state === "playing") dropTile();
    }
  }
  window.addEventListener("keydown", onKey);
  // tap / click also drops (mobile-friendly)
  window.addEventListener("pointerdown", function () {
    if (state === "start" || state === "over") startGame();
    else if (state === "playing") dropTile();
  });

  // ---------- resize ----------
  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener("resize", onResize);

  // ---------- loop ----------
  var clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);

    // move active tile
    if (state === "playing" && moving) {
      moving.pos += moving.vel * speed * dt;
      if (moving.pos > SPAN || moving.pos < -SPAN) {
        // exited without being placed -> next tile from a random side
        world.remove(moving.mesh);
        moving = null;
        spawnMoving();
      } else {
        applyMovingTransform(moving);
        // landing marker on top surface
        var mx = moving.axis === "z" ? moving.cross : moving.pos;
        var mz = moving.axis === "z" ? moving.pos : moving.cross;
        marker.position.set(mx, topSurfaceY() + 0.02, mz);
      }
    }

    // animate falling tiles
    for (var i = falling.length - 1; i >= 0; i--) {
      var f = falling[i];
      f.vy -= 22 * dt;
      f.mesh.position.x += f.vx * dt;
      f.mesh.position.y += f.vy * dt;
      f.mesh.position.z += f.vz * dt;
      f.mesh.rotation.x += f.rx * dt;
      f.mesh.rotation.z += f.rz * dt;
      if (f.mesh.position.y < -25) {
        if (f.mesh.parent) f.mesh.parent.remove(f.mesh);
        falling.splice(i, 1);
      }
    }

    // camera follows the top of the stack
    var top = topTile();
    if (top) {
      var ty = top.y;
      camTarget.lerp(new THREE.Vector3(top.x * 0.4, ty - 2, top.z * 0.4), 0.06);
      var desired = new THREE.Vector3(camTarget.x + 17, camTarget.y + 13, camTarget.z + 17);
      camera.position.lerp(desired, 0.06);
      camera.lookAt(camTarget.x, camTarget.y + 1.5, camTarget.z);
    }

    renderer.render(scene, camera);
  }

  // initial camera framing
  camera.position.set(17, 14, 17);
  camera.lookAt(0, 0, 0);
  animate();
})();
</script>
</body>
</html>
