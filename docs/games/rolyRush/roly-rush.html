<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>롤리폴리 러시 (Roly Rush)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #9fd8ff; font-family: 'Trebuchet MS', 'Apple SD Gothic Neo', sans-serif; }
  #game { display: block; width: 100%; height: 100%; cursor: crosshair; }

  #hud {
    position: absolute; top: 16px; left: 0; width: 100%;
    display: flex; justify-content: space-between; padding: 0 22px;
    color: #fff; z-index: 5; pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,.35);
  }
  #hud .stat { font-size: 14px; opacity: .9; letter-spacing: 1px; }
  #hud .val { font-size: 30px; font-weight: 800; }
  #distTag { color: #fff; } #altTag { color: #bff0ff; } #maxAltTag { color: #ffe98a; }

  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: #2a2350; z-index: 10; pointer-events: none; }
  .overlay.hidden { display: none; }
  .panel { background: rgba(255,255,255,.93); border: 3px solid #ff8fd0; border-radius: 22px; padding: 30px 40px; max-width: 480px; pointer-events: auto; box-shadow: 0 18px 50px rgba(0,0,0,.25); }
  .title { font-size: 40px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg,#ff7ac3,#7a9bff,#5fe0c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .subtitle { margin-top: 4px; font-size: 14px; color: #8a86a8; letter-spacing: 3px; }
  .keys { margin: 20px 0; font-size: 15px; color: #4a4570; line-height: 2; }
  .keys b { color: #ff5fae; }
  .btn { margin-top: 8px; display: inline-block; cursor: pointer; padding: 13px 36px; border-radius: 999px; font-size: 18px; font-weight: 800; color: #fff; background: linear-gradient(90deg,#ff7ac3,#7a9bff); border: none; pointer-events: auto; letter-spacing: 1px; }
  .btn:hover { filter: brightness(1.06); }
  .small { font-size: 12px; color: #8a86a8; margin-top: 12px; }

  #toast { position: absolute; left: 50%; top: 20%; transform: translateX(-50%); background: rgba(122,155,255,.95); color: #fff; font-weight: 800; font-size: 18px; padding: 10px 22px; border-radius: 999px; z-index: 8; opacity: 0; transition: opacity .25s; pointer-events: none; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div><div class="stat">이동 거리</div><div class="val"><span id="distTag">0</span> m</div></div>
  <div style="text-align:center"><div class="stat">현재 고도</div><div class="val"><span id="altTag">0</span> m</div></div>
  <div style="text-align:right"><div class="stat">최고 고도</div><div class="val"><span id="maxAltTag">0</span> m</div></div>
</div>

<div id="toast"></div>

<div id="startScreen" class="overlay">
  <div class="panel">
    <div class="title">롤리폴리 러시</div>
    <div class="subtitle">ROLY RUSH · OPEN FIELD</div>
    <div class="keys">
      이동 <b>W A S D</b> &nbsp;·&nbsp; 점프 <b>SPACE</b> (한/영 무관)<br>
      점프 중 <b>SPACE</b> 한 번 더 → <b>다이브</b> (틈·턱 넘기)<br>
      <b>마우스 이동</b>으로 시점 회전 (클릭 시 커서 고정)<br>
      드넓은 평원과 산맥을 자유롭게 누비세요.<br>
      가파른 절벽은 <b>점프로 기어올라</b> 정상을 정복!
    </div>
    <button class="btn" id="startBtn">시작하기</button>
    <div class="small">데스크탑에서 키보드 + 마우스로 플레이하세요</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  // ===================== Core =====================
  const canvas = document.getElementById('game');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9fd8ff);
  scene.fog = new THREE.Fog(0x9fd8ff, 120, 240);

  const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 600);
  function resize() { const w = window.innerWidth, h = window.innerHeight; renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix(); }
  window.addEventListener('resize', resize); resize();

  scene.add(new THREE.AmbientLight(0xffffff, 0.78));
  const sun = new THREE.DirectionalLight(0xfff2d8, 0.95);
  sun.position.set(0.6, 1, 0.4); scene.add(sun);
  const sky = new THREE.HemisphereLight(0xcfefff, 0x6b7a4a, 0.5); scene.add(sky);

  // ===================== Procedural terrain =====================
  function hash(ix, iz) {
    let h = (ix | 0) * 374761393 + (iz | 0) * 668265263;
    h = (h ^ (h >> 13)) * 1274126177;
    h = (h ^ (h >> 16));
    return ((h & 0x7fffffff) % 100000) / 100000;
  }
  function vnoise(x, z) {
    const x0 = Math.floor(x), z0 = Math.floor(z);
    const fx = x - x0, fz = z - z0;
    const a = hash(x0, z0), b = hash(x0 + 1, z0), c = hash(x0, z0 + 1), d = hash(x0 + 1, z0 + 1);
    const ux = fx * fx * (3 - 2 * fx), uz = fz * fz * (3 - 2 * fz);
    return a * (1 - ux) * (1 - uz) + b * ux * (1 - uz) + c * (1 - ux) * uz + d * ux * uz;
  }
  function fbm(x, z, oct) {
    let s = 0, a = 0.5, f = 1, norm = 0;
    for (let i = 0; i < oct; i++) { s += a * vnoise(x * f, z * f); norm += a; f *= 2; a *= 0.5; }
    return s / norm; // 0..1
  }
  function smooth(e0, e1, x) { const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0))); return t * t * (3 - 2 * t); }

  // 평원(완만) + 산맥(마스크로 구역 형성)
  function terrainH(x, z) {
    const hills = (fbm(x * 0.012, z * 0.012, 4) - 0.5) * 14;           // 완만한 구릉 ±7
    const maskRaw = fbm(x * 0.0035 + 50, z * 0.0035 + 50, 3);          // 0..1 산맥 구역
    const mask = smooth(0.52, 0.8, maskRaw);
    const ridges = Math.pow(fbm(x * 0.02 + 10, z * 0.02 + 10, 5), 1.3);
    const mountains = mask * ridges * 78;                              // 최대 ~78
    return hills + mountains + 4; // 기준 높이 살짝
  }

  function colorFor(h, slope) {
    // [r,g,b]
    if (h < 7) return [0.40, 0.66, 0.34];        // 잔디
    if (h < 16) return [0.47, 0.58, 0.30];       // 풀-올리브
    if (h < 30) return [0.52, 0.43, 0.31];       // 흙
    if (h < 48) return [0.50, 0.50, 0.53];       // 바위
    return [0.93, 0.95, 0.99];                   // 설산
  }

  const CHUNK = 50, SEG = 24, RAD = 3;
  const chunks = new Map();
  function buildChunk(cx, cz) {
    const geo = new THREE.PlaneGeometry(CHUNK, CHUNK, SEG, SEG);
    geo.rotateX(-Math.PI / 2);
    const pos = geo.attributes.position;
    const ox = cx * CHUNK, oz = cz * CHUNK;
    const colors = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) {
      const wx = pos.getX(i) + ox, wz = pos.getZ(i) + oz;
      const h = terrainH(wx, wz);
      pos.setY(i, h);
      const c = colorFor(h, 0);
      colors[i * 3] = c[0]; colors[i * 3 + 1] = c[1]; colors[i * 3 + 2] = c[2];
    }
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1, metalness: 0, flatShading: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(ox, 0, oz);
    scene.add(mesh);
    chunks.set(cx + ',' + cz, mesh);
  }
  function ensureChunks() {
    const pcx = Math.round(state.pos.x / CHUNK), pcz = Math.round(state.pos.z / CHUNK);
    for (let dz = -RAD; dz <= RAD; dz++)
      for (let dx = -RAD; dx <= RAD; dx++) {
        const key = (pcx + dx) + ',' + (pcz + dz);
        if (!chunks.has(key)) buildChunk(pcx + dx, pcz + dz);
      }
    for (const [key, mesh] of chunks) {
      const [kx, kz] = key.split(',').map(Number);
      if (Math.abs(kx - pcx) > RAD + 1 || Math.abs(kz - pcz) > RAD + 1) {
        scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); chunks.delete(key);
      }
    }
  }

  // ===================== Player =====================
  const CANDY = [0xff8fc7, 0x8fb6ff, 0x9be7a0, 0xffd36b, 0xc6a3ff, 0x7fe5d8];
  const beanMat = new THREE.MeshStandardMaterial({ color: CANDY[Math.floor(Math.random() * CANDY.length)], roughness: 0.55 });
  const player = new THREE.Group();
  (function buildBean() {
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 22, 18), beanMat);
    body.scale.set(1, 1.45, 1); body.position.y = 0.85; player.add(body);
    const eyeW = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const eyeB = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.3 });
    for (const sx of [-0.22, 0.22]) {
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), eyeW);
      w.position.set(sx, 1.25, 0.5); w.scale.set(1, 1.15, 0.6); player.add(w);
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 10), eyeB);
      b.position.set(sx, 1.25, 0.62); player.add(b);
    }
  })();
  scene.add(player);

  // ===================== State =====================
  const state = {
    running: false,
    pos: new THREE.Vector3(0, 0, 0), vel: new THREE.Vector3(0, 0, 0),
    onGround: true, usedDouble: false, diving: false, sliding: false, slideT: 0,
    facing: 0, dist: 0, maxAlt: 0, time: 0, start: new THREE.Vector3(0, 0, 0),
  };
  const GRAV = 24, MOVE = 12, AIR = 0.5, JUMP_V = 11.5;
  const DIVE_FWD = 15, DIVE_UP = 3.6, SLIDE_TIME = 0.28;
  const MAXSLOPE = 1.5;     // 이보다 가파른 오르막은 걸어서 못 감(점프 필요)
  const GROUND_SNAP = 0.9;  // 내리막에서 지면에 붙는 허용치

  // ===================== Input =====================
  const keys = {};
  let jumpLatched = false;
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (!jumpLatched) { jumpLatched = true; tryJump(); } }
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; if (e.code === 'Space') jumpLatched = false; });

  function rotateBy(dx, dy) { yaw -= dx * 0.0026; pitch += dy * 0.0022; pitch = Math.max(0.12, Math.min(1.2, pitch)); }
  window.addEventListener('mousemove', (e) => { if (state.running) rotateBy(e.movementX || 0, e.movementY || 0); });
  canvas.addEventListener('click', () => { if (state.running && canvas.requestPointerLock) canvas.requestPointerLock(); });
  let tLast = null;
  canvas.addEventListener('touchstart', (e) => { tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  window.addEventListener('touchend', () => { tLast = null; });
  window.addEventListener('touchmove', (e) => { if (!tLast) return; rotateBy(e.touches[0].clientX - tLast.x, e.touches[0].clientY - tLast.y); tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });

  let yaw = 0, pitch = 0.5;
  const CAM_DIST = 12, CAM_BASE_H = 5;

  function forwardDir() { return new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)); }
  function rightDir() { return new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)); }

  function tryJump() {
    if (!state.running) return;
    if (state.onGround) {
      state.vel.y = JUMP_V; state.onGround = false; state.usedDouble = false; state.sliding = false; state.slideT = 0;
    } else if (!state.usedDouble && !state.diving) {
      state.usedDouble = true; state.diving = true;
      const sp = Math.hypot(state.vel.x, state.vel.z);
      const dir = sp > 1 ? new THREE.Vector3(state.vel.x, 0, state.vel.z).normalize() : forwardDir();
      state.vel.x = dir.x * DIVE_FWD; state.vel.z = dir.z * DIVE_FWD; state.vel.y = DIVE_UP;
    }
  }

  let toastT = 0;
  function showToast(m) { const el = document.getElementById('toast'); el.textContent = m; el.classList.add('show'); toastT = 1.2; }

  // ===================== Update =====================
  function update(dt) {
    state.time += dt;
    if (toastT > 0) { toastT -= dt; if (toastT <= 0) document.getElementById('toast').classList.remove('show'); }

    if (state.running) {
      let ix = 0, iz = 0;
      if (keys['KeyW'] || keys['ArrowUp']) iz += 1;
      if (keys['KeyS'] || keys['ArrowDown']) iz -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
      if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
      const f = forwardDir(), r = rightDir();
      let mvx = r.x * ix + f.x * iz, mvz = r.z * ix + f.z * iz;
      const ml = Math.hypot(mvx, mvz);
      if (ml > 0) { mvx /= ml; mvz /= ml; state.facing = Math.atan2(mvx, mvz); }

      if (state.sliding) {
        state.vel.x *= (1 - 3.0 * dt); state.vel.z *= (1 - 3.0 * dt);
        state.slideT -= dt; if (state.slideT <= 0 && state.onGround) state.sliding = false;
      } else if (state.onGround) {
        state.vel.x = mvx * MOVE; state.vel.z = mvz * MOVE;
      } else {
        state.vel.x += mvx * MOVE * AIR * dt * 6; state.vel.z += mvz * MOVE * AIR * dt * 6;
        const hsp = Math.hypot(state.vel.x, state.vel.z), cap = state.diving ? DIVE_FWD : MOVE * 1.2;
        if (hsp > cap) { state.vel.x *= cap / hsp; state.vel.z *= cap / hsp; }
      }

      state.vel.y -= GRAV * dt;

      // 수평 이동 + 경사 등반 제한
      const px = state.pos.x, pz = state.pos.z;
      let nx = px + state.vel.x * dt, nz = pz + state.vel.z * dt;
      const horiz = Math.hypot(nx - px, nz - pz);
      if (state.onGround && horiz > 1e-4) {
        const gCur = terrainH(px, pz), gNew = terrainH(nx, nz);
        const slope = (gNew - gCur) / horiz;
        if (slope > MAXSLOPE) {           // 너무 가파른 오르막 → 막힘(점프해서 올라야 함)
          nx = px; nz = pz; state.vel.x *= 0.15; state.vel.z *= 0.15;
        }
      }
      state.dist += Math.hypot(nx - px, nz - pz);
      state.pos.x = nx; state.pos.z = nz;
      state.pos.y += state.vel.y * dt;

      // 지면 처리
      const gy = terrainH(state.pos.x, state.pos.z);
      if (state.vel.y <= 0 && state.pos.y <= gy + GROUND_SNAP) {
        if (!state.onGround && state.diving) { state.diving = false; state.sliding = true; state.slideT = SLIDE_TIME; }
        state.pos.y = gy; state.vel.y = 0; state.onGround = true; state.usedDouble = false;
      } else {
        state.onGround = false;
      }

      // HUD
      const distM = Math.floor(state.dist);
      const alt = Math.floor(state.pos.y);
      if (alt > state.maxAlt) { state.maxAlt = alt; document.getElementById('maxAltTag').textContent = alt; }
      document.getElementById('distTag').textContent = distM;
      document.getElementById('altTag').textContent = alt;

      ensureChunks();
    }

    // 플레이어 메쉬 + 자세
    player.position.set(state.pos.x, state.pos.y, state.pos.z);
    let targRotX = 0, targSY = 1;
    if (state.sliding) { targRotX = Math.PI / 2 * 0.8; targSY = 0.6; }
    else if (state.diving) { targRotX = Math.PI / 2 * 0.6; }
    player.rotation.x += (targRotX - player.rotation.x) * Math.min(1, dt * 14);
    player.scale.y += (targSY - player.scale.y) * Math.min(1, dt * 12);
    player.rotation.y += (state.facing - player.rotation.y) * Math.min(1, dt * 10);

    // 카메라
    const off = new THREE.Vector3(
      -Math.sin(yaw) * Math.cos(pitch) * CAM_DIST,
      Math.sin(pitch) * CAM_DIST + CAM_BASE_H,
      -Math.cos(yaw) * Math.cos(pitch) * CAM_DIST
    );
    const camTarget = new THREE.Vector3(state.pos.x, state.pos.y + 1.4, state.pos.z).add(off);
    if (!camera.userData.init) { camera.position.copy(camTarget); camera.userData.init = true; }
    camera.position.lerp(camTarget, Math.min(1, dt * 6));
    camera.lookAt(state.pos.x, state.pos.y + 1.2, state.pos.z);
    sun.position.set(state.pos.x + 60, state.pos.y + 120, state.pos.z + 40);
  }

  // ===================== Flow =====================
  function clearChunks() { for (const [k, m] of chunks) { scene.remove(m); m.geometry.dispose(); m.material.dispose(); } chunks.clear(); }

  function restart() {
    clearChunks();
    const h0 = terrainH(0, 0);
    state.running = true;
    state.pos.set(0, h0 + 0.2, 0); state.vel.set(0, 0, 0);
    state.onGround = true; state.usedDouble = false; state.diving = false; state.sliding = false; state.slideT = 0;
    state.dist = 0; state.maxAlt = Math.floor(h0); state.time = 0;
    yaw = 0; pitch = 0.5; camera.userData.init = false;
    document.getElementById('distTag').textContent = '0';
    document.getElementById('altTag').textContent = Math.floor(h0);
    document.getElementById('maxAltTag').textContent = Math.floor(h0);
    ensureChunks();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    if (canvas.requestPointerLock) canvas.requestPointerLock();
  }
  document.getElementById('startBtn').addEventListener('click', restart);

  // ===================== Loop =====================
  const clock = new THREE.Clock();
  function loop() { const dt = Math.min(clock.getDelta(), 0.05); update(dt); renderer.render(scene, camera); requestAnimationFrame(loop); }

  // 시작 전 미리보기
  ensureChunks();
  loop();
})();
</script>
</body>
</html>
