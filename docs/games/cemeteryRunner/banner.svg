<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" width="1600" height="560" role="img" aria-label="공동묘지 러너">
  <defs>
    <linearGradient id="bsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12152e"/>
      <stop offset="0.6" stop-color="#0a0b16"/>
      <stop offset="1" stop-color="#08080f"/>
    </linearGradient>
    <radialGradient id="bmoon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cfe0ff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#9bb4ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9bb4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9be7ff"/>
      <stop offset="1" stop-color="#c9a3ff"/>
    </linearGradient>
    <linearGradient id="bground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2130"/>
      <stop offset="1" stop-color="#0b0e16"/>
    </linearGradient>
    <filter id="bglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bsoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1600" height="560" fill="url(#bsky)"/>

  <!-- 달 (오른쪽) -->
  <circle cx="1230" cy="180" r="190" fill="url(#bmoon)"/>
  <circle cx="1230" cy="180" r="92" fill="#e9eefc"/>
  <circle cx="1268" cy="160" r="16" fill="#d3dbef" opacity="0.7"/>
  <circle cx="1208" cy="214" r="12" fill="#d3dbef" opacity="0.6"/>

  <!-- 안개 -->
  <ellipse cx="800" cy="430" rx="760" ry="46" fill="#44ff99" opacity="0.06" filter="url(#bsoft)"/>

  <!-- 묘비 줄 (배경) -->
  <g fill="#3a4250" opacity="0.8">
    <path d="M980 440 h54 v-46 a27 27 0 0 0 -54 0 Z"/>
    <rect x="1080" y="404" width="48" height="36" rx="6"/>
    <path d="M1360 440 h50 v-40 a25 25 0 0 0 -50 0 Z"/>
    <rect x="900" y="412" width="40" height="28" rx="5"/>
  </g>

  <!-- 좀비 러너 (가운데-오른쪽) -->
  <g filter="url(#bglow)" transform="translate(820,150) scale(1.25)">
    <rect x="300" y="470" width="26" height="92" rx="13" fill="#586b39" transform="rotate(28 313 500)"/>
    <rect x="318" y="470" width="26" height="96" rx="13" fill="#6f8f4f" transform="rotate(-22 331 500)"/>
    <rect x="356" y="556" width="40" height="18" rx="8" fill="#15161e" transform="rotate(-10 376 565)"/>
    <rect x="270" y="556" width="40" height="18" rx="8" fill="#15161e" transform="rotate(14 290 565)"/>
    <rect x="300" y="392" width="46" height="104" rx="22" fill="#46566b" transform="rotate(18 323 444)"/>
    <g transform="rotate(18 360 388)">
      <circle cx="360" cy="380" r="34" fill="#7fa15a"/>
      <circle cx="372" cy="372" r="6" fill="#ffd23f"/>
      <path d="M348 392 q12 8 24 0" stroke="#201a18" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <rect x="298" y="404" width="22" height="86" rx="11" fill="#6f8f4f" transform="rotate(64 309 430)"/>
    <rect x="336" y="404" width="22" height="92" rx="11" fill="#7fa15a" transform="rotate(96 347 430)"/>
    <circle cx="332" cy="420" r="6" fill="#7a1f1f"/>
  </g>

  <!-- 땅 -->
  <rect x="0" y="440" width="1600" height="120" fill="url(#bground)"/>

  <!-- 타이틀 (왼쪽) -->
  <g font-family="'Black Han Sans','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
    <text x="90" y="250" font-size="120" font-weight="900" fill="url(#btitle)" filter="url(#bglow)">공동묘지 러너</text>
    <text x="96" y="320" font-size="40" font-weight="700" letter-spacing="14" fill="#8fb9d8" font-family="Arial,Helvetica,sans-serif">CEMETERY RUNNER</text>
    <text x="98" y="372" font-size="26" font-weight="400" fill="#b8c3da" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">묘비와 조여오는 벽을 피해 끝없이 달려라</text>
  </g>
</svg>
