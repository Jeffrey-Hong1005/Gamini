<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" width="640" height="800" role="img" aria-label="타일 스택">
  <defs>
    <linearGradient id="ts_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2330"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="ts_title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fe0c0"/>
      <stop offset="0.5" stop-color="#7a9bff"/>
      <stop offset="1" stop-color="#c08bff"/>
    </linearGradient>
    <filter id="ts_soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect x="6" y="6" width="628" height="788" rx="40" fill="url(#ts_sky)" stroke="#2c3a52" stroke-width="6"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="120" r="3"/><circle cx="520" cy="150" r="2.5"/>
    <circle cx="430" cy="90" r="2"/><circle cx="80" cy="220" r="2"/>
    <circle cx="560" cy="300" r="2.5"/>
  </g>

  <!-- shadow -->
  <ellipse cx="320" cy="650" rx="220" ry="44" fill="#000000" opacity="0.35" filter="url(#ts_soft)"/>

  <!-- isometric tile stack (top faces + sides) -->
  <g stroke="#0e1116" stroke-width="3" stroke-linejoin="round">
    <!-- base -->
    <g><path d="M320 560 L500 620 L320 680 L140 620 Z" fill="#3a4252"/>
       <path d="M140 620 L320 680 L320 720 L140 660 Z" fill="#2c333f"/>
       <path d="M500 620 L320 680 L320 720 L500 660 Z" fill="#222831"/></g>
    <!-- tile 1 -->
    <g><path d="M332 486 L496 540 L332 594 L168 540 Z" fill="#4f93d8"/>
       <path d="M168 540 L332 594 L332 628 L168 574 Z" fill="#3d74ac"/>
       <path d="M496 540 L332 594 L332 628 L496 574 Z" fill="#315f8c"/></g>
    <!-- tile 2 (slightly offset = leaning) -->
    <g><path d="M352 418 L500 466 L352 514 L204 466 Z" fill="#5fcf9a"/>
       <path d="M204 466 L352 514 L352 546 L204 498 Z" fill="#49a87b"/>
       <path d="M500 466 L352 514 L352 546 L500 498 Z" fill="#3c8a66"/></g>
    <!-- tile 3 -->
    <g><path d="M338 356 L470 398 L338 440 L206 398 Z" fill="#9b7ff0"/>
       <path d="M206 398 L338 440 L338 468 L206 426 Z" fill="#7c63c6"/>
       <path d="M470 398 L338 440 L338 468 L470 426 Z" fill="#6650a6"/></g>
  </g>

  <!-- incoming tile with motion arrow -->
  <g stroke="#0e1116" stroke-width="3" stroke-linejoin="round">
    <path d="M150 300 L250 332 L150 364 L50 332 Z" fill="#ffd36b" opacity="0.95"/>
  </g>
  <path d="M270 332 L330 332" stroke="#ffd36b" stroke-width="6" stroke-linecap="round" marker-end="" opacity="0.9"/>
  <path d="M322 320 L344 332 L322 344 Z" fill="#ffd36b"/>

  <!-- title -->
  <g text-anchor="middle" font-family="'Black Han Sans','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
    <text x="320" y="742" font-size="74" font-weight="900" fill="url(#ts_title)">타일 스택</text>
    <text x="320" y="780" font-size="25" font-weight="700" letter-spacing="11" fill="#8aa0c8" font-family="Arial,Helvetica,sans-serif">TILE STACK</text>
  </g>
</svg>
