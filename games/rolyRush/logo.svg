<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" width="640" height="800" role="img" aria-label="롤리폴리 러시">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aee6ff"/>
      <stop offset="1" stop-color="#e9c8ff"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7ac3"/>
      <stop offset="0.5" stop-color="#7a9bff"/>
      <stop offset="1" stop-color="#5fe0c0"/>
    </linearGradient>
    <linearGradient id="plat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd36b"/>
      <stop offset="1" stop-color="#ff9e4a"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>

  <rect x="6" y="6" width="628" height="788" rx="40" fill="url(#sky)" stroke="#ffffff" stroke-width="6"/>

  <!-- 구름 -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="150" cy="150" rx="70" ry="34"/>
    <ellipse cx="200" cy="140" rx="50" ry="28"/>
    <ellipse cx="500" cy="220" rx="60" ry="30"/>
  </g>

  <!-- 회전 바 장애물(뒤) -->
  <g transform="translate(320 470) rotate(-18)">
    <rect x="-150" y="-13" width="300" height="26" rx="13" fill="#ff5d7e"/>
    <circle cx="0" cy="0" r="22" fill="#ffffff"/>
  </g>

  <!-- 플랫폼 -->
  <ellipse cx="320" cy="660" rx="250" ry="30" fill="#000000" opacity="0.08" filter="url(#soft)"/>
  <rect x="120" y="560" width="400" height="80" rx="24" fill="url(#plat)" stroke="#e07b2e" stroke-width="4"/>
  <g fill="#ffffff" opacity="0.5">
    <rect x="150" y="572" width="26" height="56" rx="8"/>
    <rect x="250" y="572" width="26" height="56" rx="8"/>
    <rect x="350" y="572" width="26" height="56" rx="8"/>
    <rect x="450" y="572" width="26" height="56" rx="8"/>
  </g>

  <!-- 콩 캐릭터 (점프 중) -->
  <g transform="translate(320 430)">
    <ellipse cx="0" cy="120" rx="58" ry="20" fill="#000000" opacity="0.12" filter="url(#soft)"/>
    <ellipse cx="0" cy="0" rx="62" ry="86" fill="#ff8fc7" stroke="#e85fa6" stroke-width="5"/>
    <!-- 다리 -->
    <rect x="-34" y="70" width="22" height="44" rx="11" fill="#ff8fc7" stroke="#e85fa6" stroke-width="4" transform="rotate(16 -23 92)"/>
    <rect x="12" y="70" width="22" height="44" rx="11" fill="#ff8fc7" stroke="#e85fa6" stroke-width="4" transform="rotate(-18 23 92)"/>
    <!-- 눈 -->
    <g>
      <ellipse cx="-20" cy="-16" rx="16" ry="20" fill="#ffffff"/>
      <ellipse cx="20" cy="-16" rx="16" ry="20" fill="#ffffff"/>
      <circle cx="-17" cy="-12" r="7" fill="#2a2350"/>
      <circle cx="23" cy="-12" r="7" fill="#2a2350"/>
    </g>
    <path d="M-14 30 q14 12 28 0" stroke="#c44483" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 타이틀 -->
  <g text-anchor="middle" font-family="'Black Han Sans','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
    <text x="320" y="722" font-size="76" font-weight="900" fill="url(#title)">롤리폴리 러시</text>
    <text x="320" y="762" font-size="27" font-weight="700" letter-spacing="10" fill="#7a6fb0" font-family="Arial,Helvetica,sans-serif">ROLY RUSH</text>
  </g>
</svg>
