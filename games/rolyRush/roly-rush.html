<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>롤리폴리 러시 (Roly Rush)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #9fd8ff; font-family: 'Trebuchet MS', 'Apple SD Gothic Neo', sans-serif; }
  #game { display: block; width: 100%; height: 100%; cursor: crosshair; }

  #hud { position: absolute; top: 16px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 22px; color: #fff; z-index: 5; pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,.35); }
  #hud .stat { font-size: 14px; opacity: .9; letter-spacing: 1px; }
  #hud .val { font-size: 30px; font-weight: 800; }
  #distTag { color: #fff; } #bestTag { color: #ffe98a; }

  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: #2a2350; z-index: 10; pointer-events: none; }
  .overlay.hidden { display: none; }
  .panel { background: rgba(255,255,255,.93); border: 3px solid #ff8fd0; border-radius: 22px; padding: 30px 40px; max-width: 480px; pointer-events: auto; box-shadow: 0 18px 50px rgba(0,0,0,.25); }
  .title { font-size: 40px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg,#ff7ac3,#7a9bff,#5fe0c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .title.over { background: linear-gradient(90deg,#ff6b6b,#ffa36b); -webkit-background-clip: text; background-clip: text; }
  .subtitle { margin-top: 4px; font-size: 14px; color: #8a86a8; letter-spacing: 3px; }
  .big { font-size: 54px; font-weight: 900; color: #ff5fae; margin: 6px 0; }
  .keys { margin: 18px 0; font-size: 15px; color: #4a4570; line-height: 2; }
  .keys b { color: #ff5fae; }
  .btn { margin-top: 8px; display: inline-block; cursor: pointer; padding: 13px 36px; border-radius: 999px; font-size: 18px; font-weight: 800; color: #fff; background: linear-gradient(90deg,#ff7ac3,#7a9bff); border: none; pointer-events: auto; letter-spacing: 1px; }
  .btn:hover { filter: brightness(1.06); }
  .small { font-size: 12px; color: #8a86a8; margin-top: 12px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div><div class="stat">거리</div><div class="val"><span id="distTag">0</span> m</div></div>
  <div style="text-align:right"><div class="stat">최고 기록</div><div class="val"><span id="bestTag">0</span> m</div></div>
</div>

<div id="startScreen" class="overlay">
  <div class="panel">
    <div class="title">롤리폴리 러시</div>
    <div class="subtitle">ROLY RUSH</div>
    <div class="keys">
      이동 <b>W A S D</b> &nbsp;·&nbsp; 점프 <b>SPACE</b> (한/영 무관)<br>
      점프 중 <b>SPACE</b> 한 번 더 → <b>다이브</b> (틈 넘기)<br>
      <b>마우스 이동</b>으로 시점 회전 (클릭 시 커서 고정)<br>
      회전 바·흔들리는 추·미는 블록·이동 벽·구르는 바위를 피해<br>
      앞으로 나아가세요. <b>떨어지면 게임 오버!</b> 기록은 나아간 거리.
    </div>
    <button class="btn" id="startBtn">시작하기</button>
    <div class="small">데스크탑에서 키보드 + 마우스로 플레이하세요</div>
  </div>
</div>

<div id="gameOver" class="overlay hidden">
  <div class="panel">
    <div class="title over">GAME OVER</div>
    <div class="big"><span id="finalDist">0</span> m</div>
    <div class="subtitle">나아간 거리</div>
    <div class="keys" style="margin:10px 0">최고 기록: <b id="bestDist">0</b> m</div>
    <button class="btn" id="retryBtn">다시 하기</button>
    <div class="small"><kbd>R</kbd> 키로도 다시 시작</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  const canvas = document.getElementById('game');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9fd8ff);
  scene.fog = new THREE.Fog(0x9fd8ff, 90, 200);

  const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 500);
  function resize() { const w = window.innerWidth, h = window.innerHeight; renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix(); }
  window.addEventListener('resize', resize); resize();

  scene.add(new THREE.AmbientLight(0xffffff, 0.85));
  const sun = new THREE.DirectionalLight(0xfff2d8, 0.85); sun.position.set(0.5, 1, 0.3); scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xcfefff, 0x88a0b0, 0.5));

  // ===================== Course: 평평한 2배폭 길 =====================
  const W = 18, HALF = W / 2;     // 폭 ≈ 원래(9)의 2배
  const GROUND_Y = 0, KILL_Y = -20;

  const strips = [];     // {z0,z1}
  const modules = [];    // {z0,z1, meshes:[], obs:[]}
  let zCursor = 0, moduleCount = 0;

  const STRIP_COLORS = [0xf6d7a8, 0xf3c98f, 0xe9efa0, 0xd6f0b0];
  const matEdge = new THREE.MeshStandardMaterial({ color: 0xff8fc7, roughness: 0.7 });
  const matRed = new THREE.MeshStandardMaterial({ color: 0xff5d7e, roughness: 0.6 });
  const matPurple = new THREE.MeshStandardMaterial({ color: 0x6a4cff, roughness: 0.6 });
  const matOrange = new THREE.MeshStandardMaterial({ color: 0xff9e3d, roughness: 0.6 });
  const matPole = new THREE.MeshStandardMaterial({ color: 0xf0f0f5, roughness: 0.5 });
  const matRock = new THREE.MeshStandardMaterial({ color: 0x8a8f99, roughness: 0.9 });

  function buildStripMesh(z0, z1, idx) {
    const len = z1 - z0, cz = (z0 + z1) / 2;
    const floor = new THREE.Mesh(new THREE.BoxGeometry(W, 1.0, len), new THREE.MeshStandardMaterial({ color: STRIP_COLORS[idx % STRIP_COLORS.length], roughness: 1 }));
    floor.position.set(0, GROUND_Y - 0.5, cz); scene.add(floor);
    // 가장자리 표시(시야용, 충돌 없음)
    const eL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, len), matEdge); eL.position.set(-HALF + 0.25, GROUND_Y + 0.25, cz); scene.add(eL);
    const eR = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, len), matEdge); eR.position.set(HALF - 0.25, GROUND_Y + 0.25, cz); scene.add(eR);
    return [floor, eL, eR];
  }

  // --- 장애물 ---
  function makeObstacle(type, z0, z1, diff, mod) {
    const cz = (z0 + z1) / 2;

    if (type === 'sweeper') {
      const barLen = W - 2.5, h = 1.15, spin = (1.4 + diff * 0.9) * (Math.random() < 0.5 ? 1 : -1);
      const bar = new THREE.Mesh(new THREE.BoxGeometry(barLen, 0.55, 0.9), matRed);
      bar.position.set(0, h, cz); scene.add(bar); mod.meshes.push(bar);
      const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, h + 0.6, 12), matPole);
      hub.position.set(0, (h + 0.6) / 2, cz); scene.add(hub); mod.meshes.push(hub);
      mod.obs.push({
        update: (dt, t) => { bar.rotation.y = t * spin; },
        hit: (px, py, pz) => {
          if (py > 1.7) return false;     // 점프로 넘김
          const dx = px, dz = pz - cz, a = -bar.rotation.y;
          const lx = dx * Math.cos(a) - dz * Math.sin(a), lz = dx * Math.sin(a) + dz * Math.cos(a);
          return Math.abs(lx) < barLen / 2 && Math.abs(lz) < 1.1;
        },
        knock: () => ({ x: Math.cos(bar.rotation.y) * (spin > 0 ? -1 : 1), z: Math.sin(bar.rotation.y) * (spin > 0 ? -1 : 1) })
      });

    } else if (type === 'pendulum') {
      const spots = diff > 1.6 ? [-4.5, 4.5] : [(Math.random() < 0.5 ? -3.5 : 3.5)];
      for (const bx of spots) {
        const pivY = 7, armLen = 6;
        const pivot = new THREE.Group(); pivot.position.set(bx, pivY, cz); scene.add(pivot); mod.meshes.push(pivot);
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, armLen, 8), matPole); arm.position.y = -armLen / 2; pivot.add(arm);
        const ball = new THREE.Mesh(new THREE.SphereGeometry(1.05, 16, 14), matPurple); ball.position.y = -armLen; pivot.add(ball);
        const w = 1.5 + diff * 0.6, ph = Math.random() * 6.28, sw = 1.0;
        mod.obs.push({
          update: (dt, t) => { pivot.rotation.x = Math.sin(t * w + ph) * sw; },
          hit: (px, py, pz) => {
            const bz = cz - Math.sin(pivot.rotation.x) * armLen, by = pivY - Math.cos(pivot.rotation.x) * armLen;
            return Math.abs(px - bx) < 1.7 && Math.abs(pz - bz) < 1.7 && Math.abs((py + 0.85) - by) < 1.6;
          },
          knock: (px) => ({ x: px - bx >= 0 ? 1 : -1, z: 0.3 })
        });
      }

    } else if (type === 'pushers') {
      const n = 1 + Math.floor(diff);
      for (let k = 0; k < n; k++) {
        const side = k % 2 === 0 ? -1 : 1, pz = z0 + 4 + k * Math.max(5, (z1 - z0 - 6) / Math.max(1, n - 1));
        const block = new THREE.Mesh(new THREE.BoxGeometry(5, 2.8, 3), matOrange); scene.add(block); mod.meshes.push(block);
        const w = 1.3 + diff * 0.6, ph = Math.random() * 6.28, reach = W * 0.78;
        mod.obs.push({
          update: (dt, t) => { const ext = (Math.sin(t * w + ph) * 0.5 + 0.5) * reach; block.position.set(side * (HALF + 2.5 - ext), 1.4, pz); },
          hit: (px, py, pz2) => py < 2.8 && Math.abs(px - block.position.x) < 2.5 + 0.6 && Math.abs(pz2 - pz) < 1.5 + 0.6,
          knock: () => ({ x: side, z: 0 })
        });
      }

    } else if (type === 'movingWall') {
      const gapW = 5.5, wallH = 4, segW = (W - gapW) / 2;
      const wL = new THREE.Mesh(new THREE.BoxGeometry(segW, wallH, 1.1), matRed);
      const wR = new THREE.Mesh(new THREE.BoxGeometry(segW, wallH, 1.1), matRed);
      scene.add(wL); scene.add(wR); mod.meshes.push(wL, wR);
      const w = 1.0 + diff * 0.5, ph = Math.random() * 6.28, amp = HALF - gapW / 2 - 1;
      mod.obs.push({
        update: (dt, t) => { const gx = Math.sin(t * w + ph) * amp; wL.position.set(gx - gapW / 2 - segW / 2, wallH / 2, cz); wR.position.set(gx + gapW / 2 + segW / 2, wallH / 2, cz); },
        hit: (px, py, pz) => {
          if (py > wallH) return false;
          if (Math.abs(pz - cz) > 1.1) return false;
          const inL = px > wL.position.x - segW / 2 && px < wL.position.x + segW / 2;
          const inR = px > wR.position.x - segW / 2 && px < wR.position.x + segW / 2;
          return inL || inR;
        },
        knock: () => ({ x: 0, z: -1 })
      });

    } else { // boulder
      const n = 1 + Math.floor(diff * 0.8);
      for (let k = 0; k < n; k++) {
        const ball = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 14), matRock); scene.add(ball); mod.meshes.push(ball);
        const st = { bx: (Math.random() * 2 - 1) * (HALF - 2), bz: z1 - 2 - k * 5, sp: 13 + diff * 7, roll: 0 };
        mod.obs.push({
          update: (dt) => { st.bz -= st.sp * dt; if (st.bz < z0 - 3) { st.bz = z1 - 2; st.bx = (Math.random() * 2 - 1) * (HALF - 2); } st.roll += dt * 5; ball.position.set(st.bx, 1.5, st.bz); ball.rotation.x = st.roll; },
          hit: (px, py, pz) => py < 3 && Math.hypot(px - st.bx, pz - st.bz) < 1.5 + 0.6,
          knock: (px) => ({ x: px - st.bx >= 0 ? 1 : -1, z: -0.4 })
        });
      }
    }
  }

  function pickTypes(i) {
    const all = ['sweeper', 'pendulum', 'pushers', 'movingWall', 'boulder'];
    if (i < 2) return ['sweeper'];
    const count = i < 5 ? 2 : 3;          // 빽빽하게
    const pool = all.slice(), picks = [];
    for (let k = 0; k < count && pool.length; k++) picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    return picks;
  }

  function addModule() {
    const i = moduleCount++;
    const diff = Math.min(1 + i * 0.06, 2.8);
    let gap = 0;
    if (i > 1 && Math.random() < Math.min(0.2 + i * 0.015, 0.5)) gap = 4 + Math.random() * 2 + diff * 1.8;
    zCursor += gap;
    const len = 18 + Math.random() * 8;
    const z0 = zCursor, z1 = z0 + len;
    const mod = { z0, z1, meshes: [], obs: [] };
    mod.meshes.push.apply(mod.meshes, buildStripMesh(z0, z1, i));
    strips.push({ z0, z1 });
    for (const t of pickTypes(i)) makeObstacle(t, z0, z1, diff, mod);
    modules.push(mod);
    zCursor = z1;
  }

  function ensureCourse() {
    while (zCursor < state.pos.z + 180) addModule();
    const cut = state.pos.z - 60;
    while (modules.length && modules[0].z1 < cut) {
      const m = modules.shift();
      for (const mesh of m.meshes) { scene.remove(mesh); if (mesh.geometry) mesh.geometry.dispose(); }
      const si = strips.findIndex(s => s.z0 === m.z0 && s.z1 === m.z1); if (si >= 0) strips.splice(si, 1);
    }
  }

  function groundY(px, pz) {
    if (Math.abs(px) > HALF) return null;
    for (const s of strips) if (pz >= s.z0 && pz <= s.z1) return GROUND_Y;
    return null;
  }

  // ===================== Player =====================
  const CANDY = [0xff8fc7, 0x8fb6ff, 0x9be7a0, 0xffd36b, 0xc6a3ff, 0x7fe5d8];
  const beanMat = new THREE.MeshStandardMaterial({ color: CANDY[Math.floor(Math.random() * CANDY.length)], roughness: 0.55 });
  const player = new THREE.Group();
  (function buildBean() {
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 22, 18), beanMat);
    body.scale.set(1, 1.45, 1); body.position.y = 0.85; player.add(body);
    const eyeW = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const eyeB = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.3 });
    for (const sx of [-0.22, 0.22]) {
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), eyeW); w.position.set(sx, 1.25, 0.5); w.scale.set(1, 1.15, 0.6); player.add(w);
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 10), eyeB); b.position.set(sx, 1.25, 0.62); player.add(b);
    }
  })();
  scene.add(player);

  const state = {
    running: false, over: false,
    pos: new THREE.Vector3(0, 0, 0), vel: new THREE.Vector3(0, 0, 0),
    onGround: true, usedDouble: false, diving: false, sliding: false, slideT: 0,
    invuln: 0, facing: 0, dist: 0, time: 0,
  };
  let best = 0;
  const GRAV = 24, MOVE = 12, AIR = 0.5, JUMP_V = 11.6;
  const DIVE_FWD = 16, DIVE_UP = 3.6, SLIDE_TIME = 0.28, GROUND_SNAP = 0.6;

  // ===================== Input =====================
  const keys = {};
  let jumpLatched = false;
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (!jumpLatched) { jumpLatched = true; tryJump(); } }
    if (e.code === 'KeyR' && state.over) restart();
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; if (e.code === 'Space') jumpLatched = false; });

  let yaw = 0, pitch = 0.45;
  const CAM_DIST = 11, CAM_BASE_H = 5;
  function rotateBy(dx, dy) { yaw -= dx * 0.0026; pitch += dy * 0.0022; pitch = Math.max(0.12, Math.min(1.2, pitch)); }
  window.addEventListener('mousemove', (e) => { if (state.running) rotateBy(e.movementX || 0, e.movementY || 0); });
  canvas.addEventListener('click', () => { if (state.running && canvas.requestPointerLock) canvas.requestPointerLock(); });
  let tLast = null;
  canvas.addEventListener('touchstart', (e) => { tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
  window.addEventListener('touchend', () => { tLast = null; });
  window.addEventListener('touchmove', (e) => { if (!tLast) return; rotateBy(e.touches[0].clientX - tLast.x, e.touches[0].clientY - tLast.y); tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });

  function forwardDir() { return new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)); }
  function rightDir() { return new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)); }

  function tryJump() {
    if (!state.running) return;
    if (state.onGround) { state.vel.y = JUMP_V; state.onGround = false; state.usedDouble = false; state.sliding = false; state.slideT = 0; }
    else if (!state.usedDouble && !state.diving) {
      state.usedDouble = true; state.diving = true;
      const sp = Math.hypot(state.vel.x, state.vel.z);
      const dir = sp > 1 ? new THREE.Vector3(state.vel.x, 0, state.vel.z).normalize() : forwardDir();
      state.vel.x = dir.x * DIVE_FWD; state.vel.z = dir.z * DIVE_FWD; state.vel.y = DIVE_UP;
    }
  }

  function gameOver() {
    state.running = false; state.over = true;
    const d = Math.max(0, Math.floor(state.dist));
    if (d > best) best = d;
    document.getElementById('finalDist').textContent = d;
    document.getElementById('bestDist').textContent = best;
    document.getElementById('bestTag').textContent = best;
    if (document.exitPointerLock) document.exitPointerLock();
    document.getElementById('gameOver').classList.remove('hidden');
  }

  function update(dt) {
    state.time += dt;
    for (const m of modules) for (const o of m.obs) o.update(dt, state.time);

    if (state.running && !state.over) {
      let ix = 0, iz = 0;
      if (keys['KeyW'] || keys['ArrowUp']) iz += 1;
      if (keys['KeyS'] || keys['ArrowDown']) iz -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
      if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
      const f = forwardDir(), r = rightDir();
      let mvx = r.x * ix + f.x * iz, mvz = r.z * ix + f.z * iz;
      const ml = Math.hypot(mvx, mvz);
      if (ml > 0) { mvx /= ml; mvz /= ml; state.facing = Math.atan2(mvx, mvz); }

      if (state.sliding) { state.vel.x *= (1 - 3 * dt); state.vel.z *= (1 - 3 * dt); state.slideT -= dt; if (state.slideT <= 0 && state.onGround) state.sliding = false; }
      else if (state.onGround) { state.vel.x = mvx * MOVE; state.vel.z = mvz * MOVE; }
      else { state.vel.x += mvx * MOVE * AIR * dt * 6; state.vel.z += mvz * MOVE * AIR * dt * 6; const hsp = Math.hypot(state.vel.x, state.vel.z), cap = state.diving ? DIVE_FWD : MOVE * 1.2; if (hsp > cap) { state.vel.x *= cap / hsp; state.vel.z *= cap / hsp; } }

      state.vel.y -= GRAV * dt;
      state.pos.x += state.vel.x * dt; state.pos.y += state.vel.y * dt; state.pos.z += state.vel.z * dt;

      const gy = groundY(state.pos.x, state.pos.z);
      if (gy !== null && state.vel.y <= 0 && state.pos.y <= gy + GROUND_SNAP) {
        if (!state.onGround && state.diving) { state.diving = false; state.sliding = true; state.slideT = SLIDE_TIME; }
        state.pos.y = gy; state.vel.y = 0; state.onGround = true; state.usedDouble = false;
      } else state.onGround = false;

      if (state.invuln > 0) state.invuln -= dt;
      else {
        for (const m of modules) {
          if (m.z1 < state.pos.z - 10 || m.z0 > state.pos.z + 10) continue;
          let hitObj = null;
          for (const o of m.obs) if (o.hit(state.pos.x, state.pos.y, state.pos.z)) { hitObj = o; break; }
          if (hitObj) {
            const k = hitObj.knock(state.pos.x, state.pos.z), kl = Math.hypot(k.x, k.z) || 1;
            state.vel.x = (k.x / kl) * 18; state.vel.z = (k.z / kl) * 18; state.vel.y = 8;
            state.onGround = false; state.invuln = 0.5; state.sliding = false; state.diving = false;
            break;
          }
        }
      }

      if (state.pos.y < KILL_Y) gameOver();

      if (state.pos.z > state.dist) { state.dist = state.pos.z; document.getElementById('distTag').textContent = Math.floor(state.dist); }
      ensureCourse();
    }

    player.position.set(state.pos.x, state.pos.y, state.pos.z);
    let rx = 0, sy = 1;
    if (state.sliding) { rx = Math.PI / 2 * 0.8; sy = 0.6; } else if (state.diving) { rx = Math.PI / 2 * 0.6; }
    player.rotation.x += (rx - player.rotation.x) * Math.min(1, dt * 14);
    player.scale.y += (sy - player.scale.y) * Math.min(1, dt * 12);
    player.rotation.y += (state.facing - player.rotation.y) * Math.min(1, dt * 10);

    const off = new THREE.Vector3(-Math.sin(yaw) * Math.cos(pitch) * CAM_DIST, Math.sin(pitch) * CAM_DIST + CAM_BASE_H, -Math.cos(yaw) * Math.cos(pitch) * CAM_DIST);
    const camTarget = new THREE.Vector3(state.pos.x, state.pos.y + 1.4, state.pos.z).add(off);
    if (!camera.userData.init) { camera.position.copy(camTarget); camera.userData.init = true; }
    camera.position.lerp(camTarget, Math.min(1, dt * 6));
    camera.lookAt(state.pos.x, state.pos.y + 1.2, state.pos.z);
    sun.position.set(state.pos.x + 40, 100, state.pos.z + 30);
  }

  function resetCourse() {
    for (const m of modules) for (const mesh of m.meshes) { scene.remove(mesh); if (mesh.geometry) mesh.geometry.dispose(); }
    modules.length = 0; strips.length = 0; zCursor = 0; moduleCount = 0;
  }

  function restart() {
    resetCourse();
    state.running = true; state.over = false;
    state.pos.set(0, GROUND_Y + 0.2, 6); state.vel.set(0, 0, 0);
    state.onGround = true; state.usedDouble = false; state.diving = false; state.sliding = false; state.slideT = 0;
    state.invuln = 0.7; state.dist = 0; state.time = 0;
    yaw = 0; pitch = 0.45; camera.userData.init = false;
    document.getElementById('distTag').textContent = '0';
    document.getElementById('bestTag').textContent = best;
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOver').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    ensureCourse();
    if (canvas.requestPointerLock) canvas.requestPointerLock();
  }
  document.getElementById('startBtn').addEventListener('click', restart);
  document.getElementById('retryBtn').addEventListener('click', restart);

  const clock = new THREE.Clock();
  function loop() { const dt = Math.min(clock.getDelta(), 0.05); update(dt); renderer.render(scene, camera); requestAnimationFrame(loop); }

  ensureCourse();
  loop();
})();
</script>
</body>
</html>
