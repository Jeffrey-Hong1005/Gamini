<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2550"/>
      <stop offset="0.55" stop-color="#0e1428"/>
      <stop offset="1" stop-color="#1a0e14"/>
    </linearGradient>
    <!-- Gold text gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe79a"/>
      <stop offset="0.5" stop-color="#f5d061"/>
      <stop offset="1" stop-color="#e8a93a"/>
    </linearGradient>
    <!-- Orange text gradient -->
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb56b"/>
      <stop offset="1" stop-color="#ff7a3c"/>
    </linearGradient>
    <!-- Lava gradient -->
    <linearGradient id="lava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a2f"/>
      <stop offset="0.5" stop-color="#e23a18"/>
      <stop offset="1" stop-color="#7a0a02"/>
    </linearGradient>
    <radialGradient id="lavaGlow" cx="0.5" cy="1" r="0.8">
      <stop offset="0" stop-color="#ff8c3a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff8c3a" stop-opacity="0"/>
    </radialGradient>
    <!-- Character body gradient -->
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8585"/>
      <stop offset="1" stop-color="#f0484a"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded badge background -->
  <rect x="0" y="0" width="1200" height="1200" rx="120" fill="url(#sky)"/>
  <rect x="14" y="14" width="1172" height="1172" rx="108" fill="none" stroke="#2d2d4a" stroke-width="10"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="180" cy="170" r="4" opacity="0.8"/>
    <circle cx="320" cy="120" r="3" opacity="0.6"/>
    <circle cx="980" cy="150" r="4" opacity="0.7"/>
    <circle cx="1060" cy="260" r="3" opacity="0.5"/>
    <circle cx="120" cy="360" r="3" opacity="0.5"/>
    <circle cx="1040" cy="430" r="3" opacity="0.6"/>
    <circle cx="240" cy="250" r="2.5" opacity="0.5"/>
  </g>

  <!-- Platforms (climbing path) -->
  <g>
    <!-- moving platform (blue) -->
    <rect x="170" y="560" width="190" height="40" rx="12" fill="#3a6ea5"/>
    <rect x="170" y="560" width="190" height="14" rx="7" fill="#5b9bd5"/>
    <!-- normal platform (brown) -->
    <rect x="760" y="660" width="230" height="44" rx="12" fill="#6b4a2f"/>
    <rect x="760" y="660" width="230" height="15" rx="7" fill="#8a6240"/>
    <!-- trampoline (green) -->
    <rect x="430" y="790" width="240" height="46" rx="12" fill="#3a8a4a"/>
    <rect x="430" y="790" width="240" height="16" rx="8" fill="#56b56a"/>
  </g>

  <!-- Coins -->
  <g>
    <circle cx="640" cy="470" r="22" fill="#f9a825"/>
    <circle cx="640" cy="470" r="14" fill="#ffd95a"/>
    <circle cx="900" cy="560" r="18" fill="#f9a825"/>
    <circle cx="900" cy="560" r="11" fill="#ffd95a"/>
  </g>

  <!-- Upward arrows (climb motion) -->
  <g fill="#f5d061" opacity="0.85">
    <path d="M560 360 l40 -54 l40 54 l-22 0 l0 46 l-36 0 l0 -46 z"/>
    <path d="M572 430 l28 -38 l28 38 l-16 0 l0 30 l-24 0 l0 -30 z" opacity="0.55"/>
  </g>

  <!-- Hero character (jumping, red rounded square with eyes) -->
  <g transform="translate(520,150)">
    <ellipse cx="80" cy="186" rx="62" ry="14" fill="#000000" opacity="0.28"/>
    <rect x="20" y="20" width="120" height="120" rx="28" fill="url(#hero)"/>
    <!-- highlight -->
    <rect x="36" y="34" width="40" height="22" rx="11" fill="#ffffff" opacity="0.25"/>
    <!-- eyes -->
    <circle cx="68" cy="78" r="15" fill="#ffffff"/>
    <circle cx="112" cy="78" r="15" fill="#ffffff"/>
    <circle cx="72" cy="80" r="7.5" fill="#1a1a2e"/>
    <circle cx="116" cy="80" r="7.5" fill="#1a1a2e"/>
    <!-- little arms up (jump pose) -->
    <rect x="2" y="44" width="22" height="46" rx="11" fill="#f0484a" transform="rotate(-30 13 67)"/>
    <rect x="136" y="44" width="22" height="46" rx="11" fill="#f0484a" transform="rotate(30 147 67)"/>
  </g>

  <!-- Lava at bottom with glow -->
  <ellipse cx="600" cy="1140" rx="640" ry="240" fill="url(#lavaGlow)"/>
  <path d="M0 1080 Q150 1050 300 1075 T600 1070 T900 1078 T1200 1066 L1200 1200 L0 1200 Z" fill="url(#lava)"/>
  <path d="M0 1086 Q150 1058 300 1082 T600 1077 T900 1085 T1200 1073" fill="none" stroke="#ffb152" stroke-width="9" opacity="0.7"/>

  <!-- Title text -->
  <g font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <!-- JUMP -->
    <text x="604" y="980" font-size="180" fill="#0a0d1c" opacity="0.45">JUMP</text>
    <text x="600" y="974" font-size="180" fill="url(#gold)" stroke="#7a4a00" stroke-width="5" paint-order="stroke">JUMP</text>
    <!-- CLIMBER -->
    <text x="603" y="1078" font-size="118" fill="#0a0d1c" opacity="0.45" letter-spacing="6">CLIMBER</text>
    <text x="600" y="1073" font-size="118" fill="url(#orange)" stroke="#6e2a00" stroke-width="4" paint-order="stroke" letter-spacing="6">CLIMBER</text>
  </g>
</svg>
